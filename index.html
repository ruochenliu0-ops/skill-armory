<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Armory v2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1923;
    --bg2: #162030;
    --bg3: #1e2d40;
    --border: #2a3f55;
    --text: #e8f0fe;
    --text2: #8aa3be;
    --gold: #f5c842;
    --gold2: #e6a800;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #c084fc;
    --cyan: #22d3ee;
    --pink: #f472b6;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP NAV ===== */
  #top-nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 52px;
    flex-shrink: 0;
    gap: 4px;
  }
  #top-nav .nav-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    margin-right: 20px;
    white-space: nowrap;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { background: var(--bg3); color: var(--text); }
  .tab-btn.active { background: var(--bg3); color: var(--gold); font-weight: 600; }

  /* ===== MAIN LAYOUT ===== */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== LEFT PANEL ===== */
  #left-panel {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #left-panel::-webkit-scrollbar { width: 4px; }
  #left-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .avatar-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--bg3);
    border: 2px solid var(--gold);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-cat-svg { width: 52px; height: 52px; }
  .change-avatar-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .change-avatar-btn:hover { color: var(--text); border-color: var(--gold); }

  .char-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .char-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
  }
  .tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
  }

  .evolution-chain {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    background: var(--bg3);
    border-radius: 10px;
  }
  .evo-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    opacity: 0.4;
    font-size: 10px;
    color: var(--text2);
    transition: all 0.3s;
  }
  .evo-item.current { opacity: 1; color: var(--gold); }
  .evo-item .evo-emoji { font-size: 20px; }
  .evo-arrow { color: var(--border); font-size: 12px; }

  .xp-section { display: flex; flex-direction: column; gap: 6px; }
  .xp-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .xp-label .level-badge {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #0f1923;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
  }
  .xp-bar-bg {
    background: var(--bg3);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
  }
  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold2), var(--gold));
    border-radius: 6px;
    transition: width 0.6s ease;
  }
  .xp-numbers { font-size: 11px; color: var(--text2); text-align: right; }

  .stats-section { display: flex; flex-direction: column; gap: 8px; }
  .stats-title { font-size: 12px; color: var(--text2); font-weight: 600; letter-spacing: 0.05em; }
  .stat-row { display: flex; flex-direction: column; gap: 3px; }
  .stat-label-row { display: flex; justify-content: space-between; font-size: 11px; }
  .stat-bar-bg { background: var(--bg3); border-radius: 4px; height: 5px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

  /* ===== RIGHT CONTENT ===== */
  #right-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  #right-content::-webkit-scrollbar { width: 6px; }
  #right-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ===== TODAY TAB ===== */
  .today-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .today-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .panel-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .btn-sm {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-sm:hover { background: var(--gold); color: #0f1923; border-color: var(--gold); }

  .xp-today-tag {
    background: rgba(245,200,66,0.15);
    border: 1px solid rgba(245,200,66,0.3);
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
  }

  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .activity-icon { font-size: 20px; flex-shrink: 0; }
  .activity-body { flex: 1; min-width: 0; }
  .activity-content { font-size: 13px; line-height: 1.4; }
  .activity-time { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .activity-xp {
    flex-shrink: 0;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg3);
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .task-item:hover { border-color: var(--gold); }
  .task-item.done { opacity: 0.45; cursor: default; }
  .task-item.done:hover { border-color: var(--border); }
  .task-check {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .task-item:not(.done) .task-check:hover { border-color: var(--green); }
  .task-item.done .task-check { background: var(--green); border-color: var(--green); }
  .task-check-tick { font-size: 11px; color: #0f1923; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; }
  .task-item.done .task-title { text-decoration: line-through; }
  .task-meta { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
  .task-xp { font-size: 11px; color: var(--gold); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .overdue-badge { color: var(--orange); font-size: 12px; }

  /* ===== PROJECTS TAB ===== */
  .projects-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 800px) { .projects-grid { grid-template-columns: 1fr; } }

  .project-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .project-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .project-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
  .project-name { font-size: 16px; font-weight: 700; }
  .status-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-active { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
  .status-planning { background: rgba(96,165,250,0.15); color: var(--blue); border: 1px solid rgba(96,165,250,0.3); }
  .project-progress-wrap { margin: 10px 0; }
  .project-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .project-progress-bar-bg { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .project-progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .project-partners { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .project-partner-tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    color: var(--text2);
  }
  .risk-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(248,113,113,0.15);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* ===== FARM TAB ===== */
  .farm-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 480px;
    margin: 0 auto 24px;
  }
  .farm-cell {
    aspect-ratio: 1;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .farm-cell:hover { border-color: var(--gold); background: var(--bg3); }
  .farm-cell.empty::after { content: '+'; color: var(--text2); font-size: 22px; opacity: 0.4; }
  .farm-cell.empty:hover::after { opacity: 0.8; color: var(--gold); }
  .farm-cell.ready {
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(74,222,128,0.4);
    animation: glow-pulse 2s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(74,222,128,0.4); }
    50% { box-shadow: 0 0 20px rgba(74,222,128,0.7); }
  }
  .farm-cell.lobster { border-color: var(--orange); cursor: default; }
  .farm-cell.lobster:hover { border-color: var(--orange); }
  .cell-timer {
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    color: var(--text2);
    background: rgba(15,25,35,0.7);
  }

  .shop-title { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; letter-spacing: 0.05em; text-align: center; }
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 480px;
    margin: 0 auto;
  }
  .shop-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shop-item:hover { border-color: var(--gold); background: var(--bg3); }
  .shop-emoji { font-size: 28px; margin-bottom: 4px; }
  .shop-name { font-size: 12px; color: var(--text); margin-bottom: 2px; }
  .shop-cost { font-size: 11px; color: var(--gold); font-weight: 600; }
  .shop-time { font-size: 10px; color: var(--text2); }

  /* ===== CHARACTER TAB ===== */
  .char-detail {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .char-avatar-big {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .avatar-big-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--bg3);
    border: 3px solid var(--gold);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-big-circle img { width: 100%; height: 100%; object-fit: cover; }
  .char-big-name { font-size: 22px; font-weight: 700; color: var(--text); }
  .char-big-level {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #0f1923;
    font-weight: 700;
    font-size: 13px;
    padding: 3px 12px;
    border-radius: 14px;
  }

  .radar-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .radar-title { font-size: 14px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; }

  .evo-full {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .evo-full-title { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; }
  .evo-full-chain { display: flex; align-items: center; justify-content: space-around; gap: 8px; }
  .evo-full-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.35;
    flex: 1;
    padding: 12px 8px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: all 0.3s;
  }
  .evo-full-item.current {
    opacity: 1;
    background: rgba(245,200,66,0.08);
    border-color: rgba(245,200,66,0.3);
  }
  .evo-full-item .evo-big-emoji { font-size: 36px; }
  .evo-full-item .evo-label { font-size: 12px; font-weight: 600; color: var(--text2); }
  .evo-full-item.current .evo-label { color: var(--gold); }
  .evo-full-arrow { color: var(--border); font-size: 18px; flex-shrink: 0; }

  .achievements-section { display: flex; flex-direction: column; gap: 12px; }
  .achievements-title { font-size: 14px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; }
  .achievements-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .achievement-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    transition: all 0.2s;
  }
  .achievement-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .achievement-card.locked { opacity: 0.35; filter: grayscale(0.6); }
  .achievement-emoji { font-size: 32px; margin-bottom: 6px; }
  .achievement-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .achievement-desc { font-size: 11px; color: var(--text2); line-height: 1.3; }
  .achievement-unlocked { font-size: 10px; color: var(--green); margin-top: 4px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modal-in 0.2s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-input select { background: var(--bg3); }
  select.form-input option { background: var(--bg2); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .btn-primary {
    background: var(--gold);
    color: #0f1923;
    border: none;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--gold2); }
  .btn-secondary {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text2); }

  /* ===== PROJECT DRAWER ===== */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    display: flex;
    justify-content: flex-end;
  }
  .drawer-overlay.hidden { display: none; }
  .drawer-box {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    width: 520px;
    max-width: 100vw;
    height: 100%;
    overflow-y: auto;
    padding: 24px;
    animation: drawer-in 0.25s ease;
  }
  .drawer-box::-webkit-scrollbar { width: 4px; }
  .drawer-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @keyframes drawer-in {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .drawer-title { font-size: 18px; font-weight: 700; }
  .drawer-close {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .drawer-close:hover { color: var(--text); border-color: var(--text2); }
  .drawer-section { margin-bottom: 20px; }
  .drawer-section-title { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: flex; gap: 12px; position: relative; }
  .timeline-item:not(:last-child) .tl-line { flex: 1; }
  .tl-dot-col { display: flex; flex-direction: column; align-items: center; width: 16px; flex-shrink: 0; }
  .tl-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .tl-dot.done { background: var(--green); border-color: var(--green); }
  .tl-dot.pending { background: transparent; border-color: var(--border); }

<script>
// =============================================
// SUPABASE INIT
// =============================================
const SUPABASE_URL = 'https://qyjdqbwpbqmajhbszcft.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5amRxYndwYnFtYWpoYnN6Y2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzU3MzMsImV4cCI6MjA4OTkxMTczM30.r_oB5lbfCAqu9DZ2c4FM8oGJYg6hMchaz9Xxq8COAZ8';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// =============================================
// STATE
// =============================================
let state = {
  character: null,
  profile: null,
  activities: [],
  tasks: [],
  projects: [],
  milestones: [],
  risks: [],
  achievements: [],
  farmItems: [],
};

let pendingTaskId = null;
let pendingTaskXp = 0;
let pendingHarvestId = null;
let pendingHarvestXp = 0;
let selectedCell = null;
let selectedPlant = null;

const PLANTS = [
  { type: 'tomato', emoji: '🍅', name: '番茄', xpCost: 50, xpReward: 80, hoursReady: 2 },
  { type: 'sunflower', emoji: '🌻', name: '向日葵', xpCost: 80, xpReward: 130, hoursReady: 4 },
  { type: 'mushroom', emoji: '🍄', name: '蘑菇', xpCost: 30, xpReward: 50, hoursReady: 1 },

];

// =============================================
// UTILS
// =============================================
function today() {
  return new Date().toISOString().split('T')[0];
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '/');
}
function isOverdue(dueDate) {
  if (!dueDate) return false;
  return dueDate <= today();
}
function timeLeft(readyAt) {
  if (!readyAt) return null;
  const diff = new Date(readyAt) - Date.now();
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

// =============================================
// TOAST
// =============================================
function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// =============================================
// XP FLOAT
// =============================================
function showXpFloat(xp) {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = `+${xp} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// =============================================
// MODAL
// =============================================
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

// =============================================
// TABS
// =============================================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`pane-${name}`).classList.add('active');
  if (name === 'character') drawRadar();
}

// =============================================
// DATA FETCH
// =============================================
async function loadData() {
  try {
    const [charRes, profileRes, actRes, taskRes, projRes, mileRes, riskRes, achRes, farmRes] = await Promise.all([
      db.from('character').select('*').eq('id', 1).single(),
      db.from('user_profile').select('*').eq('id', 1).single(),
      db.from('activities').select('*').eq('date', today()).order('created_at', { ascending: false }),
      db.from('tasks').select('*').order('created_at', { ascending: false }),
      db.from('projects').select('*'),
      db.from('project_milestones').select('*'),
      db.from('project_risks').select('*'),
      db.from('achievements').select('*').order('unlocked_at', { ascending: false }),
      db.from('farm_items').select('*'),
    ]);
    state.character = charRes.data;
    state.profile = profileRes.data;
    state.activities = actRes.data || [];
    state.tasks = taskRes.data || [];
    state.projects = projRes.data || [];
    state.milestones = mileRes.data || [];
    state.risks = riskRes.data || [];
    state.achievements = achRes.data || [];
    state.farmItems = farmRes.data || [];
    renderAll();
  } catch (e) {
    console.error(e);
    showToast('加载数据失败，请刷新重试', 'error');
  }
}

// =============================================
// RENDER LEFT PANEL
// =============================================
function renderLeftPanel() {
  const char = state.character;
  const profile = state.profile;
  if (!char || !profile) return;

  // Avatar
  const avatarWrap = document.getElementById('avatar-circle');
  if (profile.avatar_url) {
    avatarWrap.innerHTML = `<img src="${profile.avatar_url}" onerror="this.outerHTML='${catSvg()}'">`;
  } else {
    avatarWrap.innerHTML = catSvg();
  }

  // Big avatar
  const bigAvatar = document.getElementById('avatar-big');
  if (profile.avatar_url) {
    bigAvatar.innerHTML = `<img src="${profile.avatar_url}" onerror="this.outerHTML='${catSvg(64)}'">`;
  } else {
    bigAvatar.innerHTML = catSvg(64);
  }

  // Name
  document.getElementById('char-name').textContent = profile.name || '未命名';
  document.getElementById('char-big-name').textContent = profile.name || '未命名';

  // Tags
  const tagsEl = document.getElementById('char-tags');
  tagsEl.innerHTML = (profile.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

  // Level
  document.getElementById('level-badge').textContent = `LV ${char.level}`;
  document.getElementById('char-big-level').textContent = `LV ${char.level}`;
  document.getElementById('level-name-text').textContent = char.level_name || `Lv ${char.level}`;

  // XP Bar
  const xpPct = Math.min(100, Math.max(0, (char.xp_total / char.xp_next) * 100));
  document.getElementById('xp-bar').style.width = `${xpPct}%`;
  document.getElementById('xp-numbers').textContent = `${char.xp_total} / ${char.xp_next} XP`;

  // Evolution
  const evoStage = char.level <= 3 ? 0 : (char.level <= 7 ? 1 : 2);
  [0,1,2].forEach(i => {
    const el = document.getElementById(`evo-${i}`);
    if (el) el.classList.toggle('current', i === evoStage);

function renderFarm() {

    const item = state.farmItems.find(f => f.grid_position === i);
    if (item && item.item_type === 'lobster') {
      cells.push({ i, type: 'lobster', emoji: '🦞' });

// Lobster animation
let lobsterPos = 0;
function startLobsterAnimation() {
  setInterval(() => {
    const lobsterItem = state.farmItems.find(f => f.item_type === 'lobster');
    if (lobsterItem) {
      const currentPos = lobsterItem.grid_position;
      const neighbors = [];
      const row = Math.floor(currentPos / 4);
      const col = currentPos % 4;
      if (row > 0) neighbors.push(currentPos - 4);
      if (row < 3) neighbors.push(currentPos + 4);
      if (col > 0) neighbors.push(currentPos - 1);
      if (col < 3) neighbors.push(currentPos + 1);
      const empties = neighbors.filter(n => !state.farmItems.find(f => f.grid_position === n && f.item_type !== 'lobster'));
      if (empties.length > 0) {
        const nextPos = empties[Math.floor(Math.random() * empties.length)];
        lobsterItem.grid_position = nextPos;
        renderFarm();
        // Update in background (no db update for lobster position as per requirements)
      }
    }
  }, 5000);
}

function drawRadar() {
  const canvas = document.getElementById('radar-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = 260;
  const cx = size / 2;
  const cy = size / 2;
  const radius = 90;
  const stats = [
    { key: 'stat_organize', name: '组织力', color: '#4ade80' },
    { key: 'stat_ai', name: 'AI力', color: '#22d3ee' },
    { key: 'stat_broadcast', name: '布道力', color: '#f472b6' },
    { key: 'stat_execute', name: '执行力', color: '#fb923c' },
    { key: 'stat_insight', name: '洞察力', color: '#c084fc' },
  ];
  const values = stats.map(s => (state.character?.[s.key] || 0));
  const maxVal = 100;

  ctx.clearRect(0, 0, size, size);

  // Draw grid
  ctx.strokeStyle = '#2a3f55';
  ctx.lineWidth = 1;
  for (let r = 0.2; r <= 1; r += 0.2) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
      const x = cx + Math.cos(angle) * radius * r;
      const y = cy + Math.sin(angle) * radius * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Draw axes
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.stroke();
    // Label
    const lx = cx + Math.cos(angle) * (radius + 22);
    const ly = cy + Math.sin(angle) * (radius + 22);
    ctx.fillStyle = stats[i].color;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stats[i].name, lx, ly);
  }

  // Draw data
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const val = Math.min(maxVal, Math.max(0, values[i]));
    const r = (val / maxVal) * radius;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,200,66,0.2)';
  ctx.fill();
  ctx.strokeStyle = '#f5c842';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw points
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const val = Math.min(maxVal, Math.max(0, values[i]));
    const r = (val / maxVal) * radius;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = stats[i].color;
    ctx.fill();
  }
}

function renderCharacterTab() {
  const char = state.character;
  if (!char) return;
  const cvs = document.getElementById('radar-canvas');
  const ctx = cvs.getContext('2d');
  const w = cvs.width, h = cvs.height, cx = w / 2, cy = h / 2, r = 80;
  const stats = [{ name: '组织力', val: char.stat_organize }, { name: 'AI力', val: char.stat_ai }, { name: '布道力', val: char.stat_broadcast }, { name: '执行力', val: char.stat_execute }, { name: '洞察力', val: char.stat_insight }];
  ctx.clearRect(0, 0, w, h);
  for (let i = 1; i <= 5; i++) {
    ctx.beginPath(); ctx.strokeStyle = '#2a3a4a';
    for (let j = 0; j < 5; j++) {
      const a = (j * 72 - 90) * Math.PI / 180;
      const x = cx + r * (i / 5) * Math.cos(a), y = cy + r * (i / 5) * Math.sin(a);
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
  }
  ctx.beginPath(); ctx.fillStyle = 'rgba(255, 107, 53, 0.3)'; ctx.strokeStyle = '#ff6b35'; ctx.lineWidth = 2;
  stats.forEach((s, i) => {
    const a = (i * 72 - 90) * Math.PI / 180;
    const x = cx + r * (s.val / 100) * Math.cos(a), y = cy + r * (s.val / 100) * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    const lx = cx + (r + 20) * Math.cos(a), ly = cy + (r + 20) * Math.sin(a);
    ctx.fillStyle = '#e8e0d5'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(s.name, lx, ly);
  });
  ctx.closePath(); ctx.fill(); ctx.stroke();
  document.getElementById('achievements-grid').innerHTML = state.achievements.map(a => `
    <div class="achievement-card"><div class="achievement-icon">${a.icon}</div><div class="achievement-name">${a.name}</div><div class="achievement-desc">${a.description}</div></div>
  `).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

document.addEventListener('DOMContentLoaded', () => {
  fetchAll();
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); }));
  setInterval(fetchAll, 30000);
});
</script>
