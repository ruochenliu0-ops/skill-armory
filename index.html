<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Armory v2.1 - 森林的工作台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f14;--bg2:#121920;--bg3:#1a2630;--border:#2a3f4d;
  --text:#e8f0f8;--text2:#8aa3b0;--gold:#f5c842;--green:#4ade80;
  --orange:#fb923c;--red:#f87171;--blue:#60a5fa;--purple:#c084fc;
  --cyan:#22d3ee;--pink:#f472b6
}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column
}

/* TOP NAV */
#top-nav{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;height:52px;gap:4px;flex-shrink:0
}
#top-nav .nav-logo{font-size:18px;font-weight:700;color:var(--gold);margin-right:20px}
.tab-btn{
  background:none;border:none;color:var(--text2);font-size:14px;
  padding:6px 16px;border-radius:8px;cursor:pointer;transition:all 0.2s
}
.tab-btn:hover{background:var(--bg3);color:var(--text)}
.tab-btn.active{background:var(--bg3);color:var(--gold);font-weight:600}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT PANEL */
#left-panel{
  width:260px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);overflow-y:auto;
  padding:16px;display:flex;flex-direction:column;gap:14px
}
#left-panel::-webkit-scrollbar{width:4px}
#left-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.avatar-circle{
  width:72px;height:72px;border-radius:50%;background:var(--bg3);
  border:2px solid var(--gold);overflow:hidden;display:flex;
  align-items:center;justify-content:center
}
.avatar-circle img{width:100%;height:100%;object-fit:cover}
.change-avatar-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer
}
.char-name{font-size:16px;font-weight:700;text-align:center}
.char-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.tag{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:2px 8px;border-radius:12px}

.xp-section{display:flex;flex-direction:column;gap:4px}
.xp-label{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.level-badge{background:var(--gold);color:#0a0f14;font-weight:700;font-size:11px;padding:2px 8px;border-radius:12px}
.xp-bar-bg{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden}
.xp-bar-fill{height:100%;background:var(--gold);border-radius:6px;transition:width 0.6s ease}
.xp-numbers{font-size:11px;color:var(--text2);text-align:right}

.stats-section{display:flex;flex-direction:column;gap:8px}
.stats-title{font-size:12px;color:var(--text2);font-weight:600}
.stat-row{display:flex;flex-direction:column;gap:3px}
.stat-label-row{display:flex;justify-content:space-between;font-size:11px}
.stat-bar-bg{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease}

/* RIGHT CONTENT */
#right-content{flex:1;overflow-y:auto;padding:16px}
#right-content::-webkit-scrollbar{width:6px}
#right-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.tab-pane{display:none}.tab-pane.active{display:block}

/* TODAY TAB */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:1000px}
@media(max-width:900px){.today-grid{grid-template-columns:1fr}}

.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.panel-title{font-size:15px;font-weight:600}
.btn-sm{
  background:var(--bg3);border:1px solid var(--border);color:var(--gold);
  font-size:12px;padding:4px 12px;border-radius:8px;cursor:pointer
}

.xp-today-tag{background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.3);color:var(--gold);font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px}

.activity-list{display:flex;flex-direction:column;gap:6px}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:8px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.activity-icon{font-size:18px;flex-shrink:0}
.activity-body{flex:1;min-width:0}
.activity-content{font-size:13px;line-height:1.4}
.activity-time{font-size:11px;color:var(--text2);margin-top:2px}
.activity-xp{flex-shrink:0;color:var(--gold);font-size:12px;font-weight:700}

.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:var(--bg3);border-radius:8px;border:1px solid var(--border);
  cursor:pointer;transition:all 0.2s
}
.task-item:hover:not(.done){border-color:var(--gold)}
.task-item.done{opacity:0.5}
.task-check{
  width:20px;height:20px;border:2px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:12px;color:#0a0f14;transition:all 0.2s
}
.task-item:not(.done) .task-check:hover{border-color:var(--green);background:rgba(74,222,128,0.1)}
.task-item.done .task-check{background:var(--green);border-color:var(--green)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px}
.task-item.done .task-title{text-decoration:line-through}
.task-meta{font-size:11px;color:var(--text2);margin-top:2px}
.overdue-badge{color:var(--orange);font-size:12px}
.task-xp{font-size:11px;color:var(--gold);font-weight:600;white-space:nowrap}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1200px}
.project-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden
}
.project-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--p-color,var(--orange))}
.project-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.project-name{font-size:15px;font-weight:700;color:var(--p-color,var(--orange))}
.status-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.status-active{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid rgba(74,222,128,0.3)}
.status-planning{background:rgba(96,165,250,0.15);color:var(--blue);border:1px solid rgba(96,165,250,0.3)}
.project-progress-wrap{margin:10px 0}
.project-progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.project-progress-bar-bg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.project-progress-bar-fill{height:100%;border-radius:4px;background:var(--p-color,var(--orange));transition:width 0.6s ease}
.project-partners{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.project-partner-tag{background:var(--bg3);border:1px solid var(--border);font-size:11px;padding:2px 7px;border-radius:10px;color:var(--text2)}
.risk-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:var(--red);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:8px}

/* PROJECT DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none}
.drawer-overlay.active{display:block}
.drawer-box{
  position:fixed;right:0;top:0;bottom:0;width:480px;max-width:90vw;
  background:var(--bg2);border-left:1px solid var(--border);padding:20px;
  overflow-y:auto;transform:translateX(100%);transition:transform 0.25s ease
}
.drawer-overlay.active .drawer-box{transform:translateX(0)}
.drawer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.drawer-title{font-size:18px;font-weight:700}
.drawer-close{
  width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center
}
.drawer-section{margin-bottom:20px}
.drawer-section-title{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:10px}

.timeline{display:flex;flex-direction:column;gap:8px}
.timeline-item{display:flex;gap:12px}
.tl-dot-col{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px}
.tl-dot.done{background:var(--green)}
.tl-dot.pending{background:var(--border)}
.tl-dot.overdue{background:var(--red)}
.tl-line{flex:1;width:2px;background:var(--border);margin:4px 0}
.tl-content{flex:1;padding-bottom:12px}
.tl-title{font-size:13px}.tl-title.done{color:var(--green)}
.tl-title.overdue{color:var(--red)}
.tl-date{font-size:11px;color:var(--text2);margin-top:2px}

.risk-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg3);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--border)}
.risk-item.risk-resolved{opacity:0.5}
.risk-level{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.risk-high{background:rgba(248,113,113,0.2);color:var(--red)}
.risk-medium{background:rgba(251,146,60,0.2);color:var(--orange)}
.risk-low{background:rgba(96,165,250,0.2);color:var(--blue)}
.risk-resolve-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}

/* PIXEL FARM */
.pixel-farm-container{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;max-width:800px}
.pixel-farm-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pixel-scene{
  background:#8b9bb0;width:100%;height:300px;border-radius:8px;position:relative;overflow:hidden;
  image-rendering:pixelated;background-image:
    linear-gradient(90deg,rgba(255,255,255,0.1) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,0.1) 1px,transparent 1px);
  background-size:20px 20px
}
.pixel-cat{
  position:absolute;width:32px;height:32px;font-size:24px;transition:all 0.3s;cursor:pointer
}
.pixel-desk{
  position:absolute;width:48px;height:32px;background:#6b7b8e;border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:16px
}
.pixel-plant{
  position:absolute;width:24px;height:24px;font-size:18px
}
.pixel-lobster{position:absolute;width:28px;height:28px;font-size:22px;animation:lobster-bounce 1s infinite}
@keyframes lobster-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.farm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:400px;margin:0 auto}
.farm-cell{
  aspect-ratio:1;background:var(--bg3);border:2px solid var(--border);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;
  position:relative;transition:all 0.2s
}
.farm-cell:hover{border-color:var(--gold)}
.farm-cell.empty{border-style:dashed}.farm-cell.ready{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,200,66,0.4)}50%{box-shadow:0 0 15px 3px rgba(245,200,66,0.2)}}
.cell-timer{position:absolute;bottom:2px;font-size:9px;color:var(--text2);background:rgba(0,0,0,0.5);padding:1px 4px;border-radius:4px}

.shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:500px;margin-top:16px}
.shop-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s}
.shop-item:hover{background:var(--border)}
.shop-emoji{font-size:28px;margin-bottom:4px}
.shop-name{font-size:12px;margin-bottom:2px}
.shop-cost{font-size:11px;color:var(--gold)}

/* CHARACTER */
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px}
@media(max-width:800px){.char-grid{grid-template-columns:1fr}}
.char-full{text-align:center;padding:20px}
.avatar-big{width:120px;height:120px;border-radius:50%;background:var(--bg3);border:3px solid var(--gold);margin:0 auto 12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.avatar-big img{width:100%;height:100%;object-fit:cover}
.radar-wrap{background:var(--bg3);border-radius:12px;padding:16px}
.achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.achievement-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.achievement-icon{font-size:28px;margin-bottom:6px}
.achievement-name{font-size:12px;font-weight:600;margin-bottom:2px}
.achievement-desc{font-size:10px;color:var(--text2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:20px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-text{font-size:13px;margin-bottom:16px;line-height:1.5}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.btn-primary{background:var(--gold);color:#0a0f14;border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer}

.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px}
.form-input:focus{outline:none;border-color:var(--gold)}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:300}
.toast{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;margin-top:8px;font-size:13px;animation:slideIn 0.3s ease}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}}

/* LOADING */
.empty-state{text-align:center;padding:30px;color:var(--text2);font-size:13px}
.empty-emoji{font-size:32px;margin-bottom:8px}
.loading-dots{display:flex;justify-content:center;gap:6px;padding:20px}
.loading-dot{width:8px;height:8px;background:var(--border);border-radius:50%;animation:dot-pulse 1.4s infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}
.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes dot-pulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* XP FLOAT */
.xp-float{position:fixed;top:100px;right:100px;font-size:24px;color:var(--gold);font-weight:700;pointer-events:none;animation:floatUp 1.5s forwards;z-index:400}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(1.2);opacity:0}}
</style>
</head>
<body>

<nav id="top-nav">
  <div class="nav-logo">⚔️ Skill Armory</div>
  <button class="tab-btn active" onclick="switchTab('today')">⚡ 今日</button>
  <button class="tab-btn" onclick="switchTab('projects')">📌 项目</button>
  <button class="tab-btn" onclick="switchTab('farm')">🌿 农场</button>
  <button class="tab-btn" onclick="switchTab('character')">👤 角色</button>
</nav>

<div id="main">
  <aside id="left-panel">
    <div class="avatar-wrap">
      <div class="avatar-circle" id="avatar-circle"></div>
      <button class="change-avatar-btn" onclick="openAvatarModal()">更换头像</button>
    </div>
    <div class="char-name" id="char-name">—</div>
    <div class="char-tags" id="char-tags"></div>
    
    <div class="xp-section">
      <div class="xp-label">
        <span id="level-name">—</span>
        <span class="level-badge" id="level-badge">LV 1</span>
      </div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-bar" style="width:0%"></div></div>
      <div class="xp-numbers" id="xp-numbers">0 / 0 XP</div>
    </div>
    
    <div class="stats-section">
      <div class="stats-title">五维属性</div>
      <div id="stats-rows"></div>
    </div>
  </aside>

  <div id="right-content">
    <!-- TODAY TAB -->
    <div class="tab-pane active" id="pane-today">
      <div class="today-grid">
        <div class="panel">
          <div class="panel-header">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="panel-title">⚡ 今日战报</span>
              <span class="xp-today-tag" id="today-xp-tag">+0 XP</span>
            </div>
            <button class="btn-sm" onclick="openActivityModal()">+ 记录</button>
          </div>
          <div class="activity-list" id="activity-list"><div class="loading-dots"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
        </div>
        
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📋 今日任务</span>
            <button class="btn-sm" onclick="openTaskModal()">+ 新增</button>
          </div>
          <div class="task-list" id="task-list"><div class="loading-dots"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
        </div>
      </div>
    </div>

    <!-- PROJECTS TAB -->
    <div class="tab-pane" id="pane-projects">
      <div class="projects-grid" id="projects-grid"><div class="loading-dots"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
    </div>

    <!-- FARM TAB -->
    <div class="tab-pane" id="pane-farm">
      <div class="pixel-farm-container">
        <div class="pixel-farm-title">🏢 像素办公室 <span style="font-size:12px;color:var(--text2);font-weight:normal">( 小猫正在努力工作 )</span></div>
        <div class="pixel-scene" id="pixel-scene">
          <div class="pixel-cat" id="pixel-cat" style="left:50px;top:100px">🐱</div>
          <div class="pixel-lobster" id="pixel-lobster" style="right:50px;top:80px">🦞</div>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">🌿 我的农场</span>
          <span style="font-size:12px;color:var(--text2)" id="farm-xp-hint">当前 XP: —</span>
        </div>
        <div class="farm-grid" id="farm-grid"></div>
        <div class="shop-grid" id="shop-grid"></div>
      </div>
    </div>

    <!-- CHARACTER TAB -->
    <div class="tab-pane" id="pane-character">
      <div class="char-grid">
        <div class="panel">
          <div class="char-full">
            <div class="avatar-big" id="avatar-big"></div>
            <div class="char-name" id="char-big-name">—</div>
            <div style="color:var(--gold);font-size:14px;margin-top:4px" id="char-big-level">LV —</div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title" style="margin-bottom:12px">📊 五维雷达</div>
          <div class="radar-wrap">
            <canvas id="radar-canvas" width="260" height="200" style="width:100%;max-width:260px"></canvas>
          </div>
        </div>
        <div class="panel" style="grid-column:1/-1">
          <div class="panel-title" style="margin-bottom:12px">🏆 成就墙</div>
          <div class="achievements-grid" id="achievements-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-activity" onclick="if(event.target===this)closeModal(this.id)">
  <div class="modal-box">
    <div class="modal-title">记录战报</div>
    <div class="form-group">
      <label class="form-label">图标</label>
      <input class="form-input" id="act-icon" value="🔥" maxlength="2">
    </div>
    <div class="form-group">
      <label class="form-label">内容</label>
      <input class="form-input" id="act-content" placeholder="完成了什么...">
    </div>
    <div class="form-group">

</div>

<div id="toast-container"></div>

<script>
const SUPABASE_URL='https://qyjdqbwpbqmajhbszcft.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5amRxYndwYnFtYWpoYnN6Y2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzU3MzMsImV4cCI6MjA4OTkxMTczM30.r_oB5lbfCAqu9DZ2c4FM8oGJYg6hMchaz9Xxq8COAZ8';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

let state={character:null,profile:null,activities:[],tasks:[],projects:[],milestones:[],risks:[],achievements:[],farmItems:[]};
let pendingTaskId=null,pendingTaskXp=0,pendingHarvestId=null,pendingHarvestXp=0,selectedCell=null,selectedPlant=null;
let pixelCatPos={x:50,y:100},pixelLobsterPos={x:300,y:80},catDirection=1;

const PLANTS=[
  {type:'tomato',emoji:'🍅',name:'番茄',xpCost:50,xpReward:80,hoursReady:2},
  {type:'sunflower',emoji:'🌻',name:'向日葵',xpCost:80,xpReward:130,hoursReady:4},
  {type:'mushroom',emoji:'🍄',name:'蘑菇',xpCost:30,xpReward:50,hoursReady:1},
  {type:'cactus',emoji:'🌵',name:'仙人掌',xpCost:100,xpReward:180,hoursReady:8}
];

function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(d){return d?d.replace(/-/g,'/'):''}
function isOverdue(d){return d&&d<=today()}

function showToast(msg,type='success'){
  const el=document.createElement('div');
  el.className='toast'+(type==='error'?' error':'');
  el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

function showXpFloat(xp){
  const el=document.createElement('div');
  el.className='xp-float';
  el.textContent='+'+xp+' XP';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

function openModal(id){document.getElementById(id).classList.add('active')}
function closeModal(id){document.getElementById(id).classList.remove('active')}

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='character')drawRadar();
  if(name==='farm')startPixelAnimation();
}

async function loadData(){
  try{
    const[charRes,profRes,actRes,taskRes,projRes,mileRes,riskRes,achRes,farmRes]=await Promise.all([
      db.from('character').select('*').eq('id',1).single(),
      db.from('user_profile').select('*').eq('id',1).single(),
      db.from('activities').select('*').eq('date',today()).order('created_at',{ascending:false}),
      db.from('tasks').select('*').order('created_at',{ascending:false}),
      db.from('projects').select('*'),
      db.from('project_milestones').select('*'),
      db.from('project_risks').select('*'),
      db.from('achievements').select('*').order('unlocked_at',{ascending:false}),
      db.from('farm_items').select('*')
    ]);
    state.character=charRes.data;
    state.profile=profRes.data;
    state.activities=actRes.data||[];
    state.tasks=taskRes.data||[];
    state.projects=projRes.data||[];
    state.milestones=mileRes.data||[];
    state.risks=riskRes.data||[];
    state.achievements=achRes.data||[];
    state.farmItems=farmRes.data||[];
    renderAll();
  }catch(e){console.error(e);showToast('加载失败','error')}
}

function renderAll(){
  renderLeftPanel();
  renderToday();
  renderProjects();
  renderFarm();
  renderCharacterTab();
}

function renderLeftPanel(){
  const char=state.character,prof=state.profile;
  if(!char||!prof)return;
  
  const avatarWrap=document.getElementById('avatar-circle');
  if(prof.avatar_url){
    avatarWrap.innerHTML='<img src="'+prof.avatar_url+'" onerror="this.outerHTML=catSvg()">';
  }else avatarWrap.innerHTML=catSvg();
  
  document.getElementById('char-name').textContent=prof.name||'未命名';
  document.getElementById('char-tags').innerHTML=(prof.tags||[]).map(t=>'<span class="tag">'+t+'</span>').join('');
  document.getElementById('level-name').textContent=char.level_name||('Lv '+char.level);
  document.getElementById('level-badge').textContent='LV '+char.level;
  document.getElementById('xp-bar').style.width=Math.min(100,(char.xp_total/char.xp_next)*100)+'%';
  document.getElementById('xp-numbers').textContent=char.xp_total+' / '+char.xp_next+' XP';
  
  const stats=[
    {key:'stat_organize',name:'组织力',color:'#4ade80'},
    {key:'stat_ai',name:'AI力',color:'#22d3ee'},
    {key:'stat_broadcast',name:'布道力',color:'#f472b6'},
    {key:'stat_execute',name:'执行力',color:'#fb923c'},
    {key:'stat_insight',name:'洞察力',color:'#c084fc'}
  ];
  document.getElementById('stats-rows').innerHTML=stats.map(s=>{
    const val=char[s.key]||0;
    return '<div class="stat-row"><div class="stat-label-row"><span style="color:'+s.color+'">'+s.name+'</span><span>'+val+'</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+val+'%;background:'+s.color+'"></div></div></div>';
  }).join('');
}

function catSvg(){
  return '<svg viewBox="0 0 100 100" style="width:48px;height:48px"><circle cx="50" cy="50" r="46" fill="#2a3f55"/><ellipse cx="50" cy="58" rx="26" ry="20" fill="#d4a853"/><polygon points="24,44 20,22 38,32" fill="#d4a853"/><polygon points="76,44 80,22 62,32" fill="#d4a853"/><circle cx="38" cy="52" r="4" fill="#0a0f14"/><circle cx="62" cy="52" r="4" fill="#0a0f14"/><ellipse cx="50" cy="60" rx="5" ry="3" fill="#b8943f"/></svg>';
}

function renderToday(){
  const actEl=document.getElementById('activity-list');
  const todayXp=state.activities.reduce((s,a)=>s+(a.xp||0),0);
  document.getElementById('today-xp-tag').textContent='+'+todayXp+' XP';
  
  if(state.activities.length===0){
    actEl.innerHTML='<div class="empty-state"><div class="empty-emoji">📝</div>今日还没有战报</div>';
  }else{
    actEl.innerHTML=state.activities.map(a=>'<div class="activity-item"><div class="activity-icon">'+(a.icon||'🔥')+'</div><div class="activity-body"><div class="activity-content">'+a.content+'</div></div><div class="activity-xp">+'+(a.xp||0)+'</div></div>').join('');
  }
  
  const taskEl=document.getElementById('task-list');
  const sorted=[...state.tasks].sort((a,b)=>a.status===b.status?0:a.status==='done'?1:-1);
  
  if(sorted.length===0){
    taskEl.innerHTML='<div class="empty-state"><div class="empty-emoji">🎯</div>暂无任务</div>';
  }else{
    taskEl.innerHTML=sorted.map(t=>{
      const isDone=t.status==='done';
      const overdue=!isDone&&isOverdue(t.due_date);
      const safeTitle=t.title.replace(/'/g,"&apos;");
      return '<div class="task-item '+(isDone?'done':'')+'" '+(isDone?'':'onclick="onTaskClick('+t.id+','+t.xp_value+',\''+safeTitle+'\')"')+'><div class="task-check">'+(isDone?'✓':'')+'</div><div class="task-body"><div class="task-title">'+t.title+(overdue?' <span class="overdue-badge">⚠️</span>':'')+'</div><div class="task-meta">'+(t.category||'')+(t.due_date?' · '+fmtDate(t.due_date):'')+'</div></div><div class="task-xp">+'+t.xp_value+'</div></div>';
    }).join('');
  }
}

function onTaskClick(id,xp,title){
  pendingTaskId=id;
  pendingTaskXp=xp;
  document.getElementById('confirm-text').textContent='确认完成「'+title+'」？获得 '+xp+' XP';
  openModal('modal-confirm');
}

async function confirmTaskDone(){
  closeModal('modal-confirm');
  if(!pendingTaskId)return;
  try{
    await db.from('tasks').update({status:'done',done_at:new Date().toISOString()}).eq('id',pendingTaskId);
    const newXp=(state.character?.xp_total||0)+pendingTaskXp;
    await db.from('character').update({xp_total:newXp}).eq('id',1);
    state.character.xp_total=newXp;
    showToast('任务完成！+'+pendingTaskXp+' XP');
    showXpFloat(pendingTaskXp);
    await loadData();
  }catch(e){showToast('操作失败','error')}
  pendingTaskId=null;
}

function renderProjects(){
  const el=document.getElementById('projects-grid');
  if(state.projects.length===0){
    el.innerHTML='<div class="empty-state"><div class="empty-emoji">📌</div>暂无项目</div>';
    return;
  }
  el.innerHTML=state.projects.map(p=>{
    const color=p.color||'#fb923c';
    const riskCount=state.risks.filter(r=>r.project_id===p.id&&r.level==='high'&&r.status!=='resolved').length;
    return '<div class="project-card" onclick="openProjectDrawer('+p.id+')" style="--p-color:'+color+'"><div class="project-card-header"><div class="project-name">'+p.name+'</div><span class="status-badge '+(p.status==='active'?'status-active':'status-planning')+'">'+(p.status==='active'?'进行中':'规划中')+'</span></div><div class="project-progress-wrap"><div class="project-progress-label"><span>进度</span><span>'+(p.progress||0)+'%</span></div><div class="project-progress-bar-bg"><div class="project-progress-bar-fill" style="width:'+(p.progress||0)+'%;"></div></div></div><div class="project-partners">'+(p.partners||[]).map(part=>'<span class="project-partner-tag">'+part+'</span>').join('')+'</div>'+(riskCount>0?'<div class="risk-badge">⚠️ 高危风险 '+riskCount+'</div>':'')+'</div>';
  }).join('');
}

function openProjectDrawer(pid){
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  
  document.getElementById('drawer-title').textContent=p.name;
  const miles=state.milestones.filter(m=>m.project_id===pid).sort((a,b)=>a.date>b.date?1:-1);
  const risks=state.risks.filter(r=>r.project_id===pid);
  const tasks=state.tasks.filter(t=>t.project_id===pid||t.category==='project');
  const color=p.color||'#fb923c';
  
  let html='<div class="drawer-section"><div class="drawer-section-title">基本信息</div><div style="font-size:13px;line-height:1.6">'+(p.description||'暂无描述')+'</div><div style="font-size:12px;color:var(--text2);margin-top:8px">'+(p.start_date||'')+(p.start_date&&p.end_date?' ~ ':'')+(p.end_date||'')+'</div></div>';
  
  html+='<div class="drawer-section"><div class="drawer-section-title">合作方</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+((p.partners||[]).map(part=>'<span class="tag">'+part+'</span>').join('')||'—')+'</div></div>';
  
  html+='<div class="drawer-section"><div class="drawer-section-title">时间线</div><div class="timeline">'+(miles.length===0?'<div style="font-size:12px;color:var(--text2)">暂无里程碑</div>':miles.map((m,idx)=>{
    const isDone=m.status==='done';
    const overdue=!isDone&&isOverdue(m.date);
    return '<div class="timeline-item"><div class="tl-dot-col"><div class="tl-dot '+(isDone?'done':(overdue?'overdue':'pending'))+'"></div>'+(idx<miles.length-1?'<div class="tl-line"></div>':'')+'</div><div class="tl-content"><div class="tl-title '+(isDone?'done':(overdue?'overdue':''))+'">'+m.title+'</div><div class="tl-date">'+fmtDate(m.date)+(overdue?' (逾期)':'')+'</div></div></div>';
  }).join(''))+'</div></div>';
  
  html+='<div class="drawer-section"><div class="drawer-section-title">风险列表</div>'+(risks.length===0?'<div style="font-size:12px;color:var(--text2)">暂无风险</div>':risks.map(r=>'<div class="risk-item '+(r.status==='resolved'?'risk-resolved':'')+'"><div><div style="font-size:13px">'+r.title+'</div><span class="risk-level risk-'+r.level+'">'+(r.level==='high'?'高危':(r.level==='medium'?'中危':'低危'))+'</span></div>'+(r.status!=='resolved'?'<button class="risk-resolve-btn" onclick="resolveRisk('+r.id+')">标记解决</button>':'')+'</div>').join(''))+'</div>';
  
  html+='<div class="drawer-section"><div class="drawer-section-title">项目 Todo ('+tasks.filter(t=>t.status!=='done').length+' 待办)</div>'+(tasks.length===0?'<div style="font-size:12px;color:var(--text2)">暂无任务</div>':tasks.map(t=>'<div class="risk-item '+(t.status==='done'?'risk-resolved':'')+'"><div style="font-size:13px">'+t.title+'</div><span style="font-size:11px;color:'+(t.status==='done'?'var(--green)':'var(--text2)')+'">'+(t.status==='done'?'已完成':'待办')+'</span></div>').join(''))+'</div>';
  
  document.getElementById('drawer-content').innerHTML=html;
  document.getElementById('drawer-overlay').classList.add('active');
}

function closeDrawer(){document.getElementById('drawer-overlay').classList.remove('active')}

async function resolveRisk(id){
  try{
    await db.from('project_risks').update({status:'resolved'}).eq('id',id);
    showToast('风险已解决');
    await loadData();
    const openPid=state.risks.find(r=>r.id===id)?.project_id;
    if(openPid)openProjectDrawer(openPid);
  }catch(e){showToast('操作失败','error')}
}

function renderFarm(){
  const el=document.getElementById('farm-grid');
  let html='';
  for(let i=0;i<16;i++){
    const item=state.farmItems.find(f=>f.grid_position===i);
    if(item&&item.item_type==='lobster'){
      html+='<div class="farm-cell" style="cursor:default">🦞</div>';
    }else if(item){
      const ready=item.status==='ready';
      const plant=PLANTS.find(p=>p.type===item.item_type);
      html+='<div class="farm-cell '+(ready?'ready':'')+'" onclick="onFarmCellClick('+i+')">'+(plant?.emoji||'🌱')+(ready?'':'<div class="cell-timer">'+(timeLeft(item.ready_at)||'...')+'</div>')+'</div>';
    }else{
      html+='<div class="farm-cell empty" onclick="onFarmEmptyClick('+i+')"></div>';
    }
  }
  el.innerHTML=html;
  
  document.getElementById('shop-grid').innerHTML=PLANTS.map(p=>'<div class="shop-item" onclick="buyPlant(\''+p.type+'\')"><div class="shop-emoji">'+p.emoji+'</div><div class="shop-name">'+p.name+'</div><div class="shop-cost">'+p.xpCost+' XP</div></div>').join('');
  document.getElementById('farm-xp-hint').textContent='当前 XP: '+(state.character?.xp_total||0);
}

function timeLeft(readyAt){
  if(!readyAt)return null;
  const diff=new Date(readyAt)-Date.now();
  if(diff<=0)return null;
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  return h>0?h+'h'+m+'m':m+'m';
}

function onFarmEmptyClick(pos){
  selectedCell=pos;
  const opts=document.getElementById('plant-options');
  opts.innerHTML=PLANTS.map(p=>'<div class="shop-item" onclick="selectPlant(\''+p.type+'\')" style="display:inline-block;width:45%;margin:2%"><div class="shop-emoji">'+p.emoji+'</div><div class="shop-name">'+p.name+'</div><div class="shop-cost">-'+p.xpCost+' XP</div></div>').join('');
  openModal('modal-plant');
}

function selectPlant(type){
  selectedPlant=PLANTS.find(p=>p.type===type);
  closeModal('modal-plant');
  if(!selectedPlant||selectedCell===null)return;
  const xp=state.character?.xp_total||0;
  if(xp<selectedPlant.xpCost){showToast('XP不足！','error');return}
  doPlant();
}

async function doPlant(){
  try{
    const readyAt=new Date(Date.now()+selectedPlant.hoursReady*3600000).toISOString();
    await db.from('farm_items').insert({
      item_type:selectedPlant.type,grid_position:selectedCell,status:'planted',
      planted_at:new Date().toISOString(),ready_at:readyAt,
      xp_cost:selectedPlant.xpCost,xp_reward:selectedPlant.xpReward,emoji:selectedPlant.emoji
    });
    const newXp=(state.character?.xp_total||0)-selectedPlant.xpCost;
    await db.from('character').update({xp_total:newXp}).eq('id',1);
    state.character.xp_total=newXp;
    showToast('种下'+selectedPlant.name+'! -'+selectedPlant.xpCost+' XP');
    selectedPlant=null;selectedCell=null;
    await loadData();
  }catch(e){showToast('种植失败','error')}
}

function onFarmCellClick(pos){
  const item=state.farmItems.find(f=>f.grid_position===pos);
  if(!item||item.status!=='ready')return;
  pendingHarvestId=item.id;
  pendingHarvestXp=item.xp_reward||0;
  const plant=PLANTS.find(p=>p.type===item.item_type);
  document.getElementById('harvest-text').textContent='收获 '+(plant?.emoji||'🌱')+' '+(plant?.name||'植物')+'? +'+(item.xp_reward||0)+' XP';
  openModal('modal-harvest');
}

async function confirmHarvest(){
  closeModal('modal-harvest');
  if(!pendingHarvestId)return;
  try{
    await db.from('farm_items').update({status:'harvested'}).eq('id',pendingHarvestId);
    const newXp=(state.character?.xp_total||0)+pendingHarvestXp;
    await db.from('character').update({xp_total:newXp}).eq('id',1);
    state.character.xp_total=newXp;
    showToast('收获成功! +'+pendingHarvestXp+' XP');
    showXpFloat(pendingHarvestXp);
    await loadData();
  }catch(e){showToast('收获失败','error')}
  pendingHarvestId=null;
}

function buyPlant(type){
  const plant=PLANTS.find(p=>p.type===type);
  const emptyCells=[];
  for(let i=0;i<16;i++)if(!state.farmItems.find(f=>f.grid_position===i))emptyCells.push(i);
  if(emptyCells.length===0){showToast('农场已满!','error');return}
  selectedCell=emptyCells[0];
  selectedPlant=plant;
  const xp=state.character?.xp_total||0;
  if(xp<plant.xpCost){showToast('XP不足!','error');return}
  doPlant();
}

function startPixelAnimation(){
  const cat=document.getElementById('pixel-cat');
  const lobster=document.getElementById('pixel-lobster');
  if(!cat||!lobster)return;
  
  setInterval(()=>{
    pixelCatPos.x+=catDirection*20;
    if(pixelCatPos.x>250||pixelCatPos.x<20)catDirection*=-1;
    cat.style.left=pixelCatPos.x+'px';
    cat.style.transform=catDirection<0?'scaleX(-1)':'scaleX(1)';
  },2000);

}

function drawRadar(){
  const canvas=document.getElementById('radar-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const char=state.character;
  if(!char)return;
  const cx=130,cy=100,r=80;
  const stats=[
    {key:'stat_organize',name:'组织力',color:'#4ade80'},
    {key:'stat_ai',name:'AI力',color:'#22d3ee'},
    {key:'stat_broadcast',name:'布道力',color:'#f472b6'},
    {key:'stat_execute',name:'执行力',color:'#fb923c'},
    {key:'stat_insight',name:'洞察力',color:'#c084fc'}
  ];
  ctx.clearRect(0,0,260,200);
  ctx.strokeStyle='#2a3f55';ctx.lineWidth=1;
  for(let r2=0.2;r2<=1;r2+=0.2){
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const ang=(Math.PI*2*i)/5-Math.PI/2;
      const x=cx+Math.cos(ang)*r*r2;
      const y=cy+Math.sin(ang)*r*r2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.stroke();
  }
  for(let i=0;i<5;i++){
    const ang=(Math.PI*2*i)/5-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);ctx.stroke();
    ctx.fillStyle=stats[i].color;ctx.font='bold 11px sans-serif';
    ctx.textAlign='center';ctx.fillText(stats[i].name,cx+Math.cos(ang)*(r+18),cy+Math.sin(ang)*(r+18));
  }
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const ang=(Math.PI*2*i)/5-Math.PI/2;
    const val=Math.min(100,Math.max(0,char[stats[i].key]||0));
    const x=cx+Math.cos(ang)*r*(val/100);
    const y=cy+Math.sin(ang)*r*(val/100);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(245,200,66,0.2)';ctx.fill();
  ctx.strokeStyle='#f5c842';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<5;i++){
    const ang=(Math.PI*2*i)/5-Math.PI/2;
    const val=Math.min(100,Math.max(0,char[stats[i].key]||0));
    ctx.beginPath();
    ctx.arc(cx+Math.cos(ang)*r*(val/100),cy+Math.sin(ang)*r*(val/100),4,0,Math.PI*2);
    ctx.fillStyle=stats[i].color;ctx.fill();
  }
}

function openActivityModal(){
  document.getElementById('act-icon').value='🔥';
  document.getElementById('act-content').value='';
  document.getElementById('act-xp').value='10';
  openModal('modal-activity');
}

async function submitActivity(){
  const icon=document.getElementById('act-icon').value.trim()||'🔥';
  const content=document.getElementById('act-content').value.trim();
  const xp=parseInt(document.getElementById('act-xp').value)||0;
  if(!content){showToast('请输入内容','error');return}
  closeModal('modal-activity');
  try{
    await db.from('activities').insert({activity_time:new Date().toISOString(),icon,content,xp,date:today()});
    const newXp=(state.character?.xp_total||0)+xp;
    await db.from('character').update({xp_total:newXp}).eq('id',1);
    state.character.xp_total=newXp;
    showToast('战报记录成功! +'+xp+' XP');
    showXpFloat(xp);
    await loadData();
  }catch(e){showToast('记录失败','error')}
}

function openTaskModal(){
  document.getElementById('task-title').value='';
  document.getElementById('task-category').value='daily';
  document.getElementById('task-xp').value='20';
  document.getElementById('task-due').value=today();
  openModal('modal-task');
}

async function submitTask(){
  const title=document.getElementById('task-title').value.trim();
  const category=document.getElementById('task-category').value;
  const xp=parseInt(document.getElementById('task-xp').value)||0;
  const dueDate=document.getElementById('task-due').value||null;
  if(!title){showToast('请输入任务名称','error');return}
  closeModal('modal-task');
  try{
    await db.from('tasks').insert({title,category,status:'todo',xp_value:xp,due_date:dueDate});
    showToast('任务添加成功');
    await loadData();
  }catch(e){showToast('添加失败','error')}
}

function openAvatarModal(){
  document.getElementById('avatar-url').value=state.profile?.avatar_url||'';
  openModal('modal-avatar');
}

async function submitAvatar(){
  const url=document.getElementById('avatar-url').value.trim();
  closeModal('modal-avatar');
  try{
    await db.from('user_profile').update({avatar_url:url||null}).eq('id',1);
    showToast('头像更新成功');
    await loadData();
  }catch(e){showToast('更新失败','error')}
}

document.addEventListener('DOMContentLoaded',()=>{
  loadData();
  document.getElementById('task-due').value=today();
});
